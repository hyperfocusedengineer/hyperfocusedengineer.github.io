<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hyperfocused Engineer</title>
  <meta name="description" content="Apps and tools by Hyperfocused Engineer.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      color: #c0c0d8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
    }
    .container { max-width: 480px; }
    h1 {
      font-size: 2rem;
      color: #00fff5;
      text-shadow: 0 0 20px rgba(0, 255, 245, 0.4);
      margin-bottom: 1rem;
    }
    .tagline {
      font-size: 1.1rem;
      color: #a0a0c0;
      margin-bottom: 2.5rem;
    }
    .apps {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
    }
    a {
      color: #00fff5;
      text-decoration: none;
      font-size: 1rem;
      padding: 0.75rem 1.25rem;
      border: 1px solid #2a2a5a;
      border-radius: 8px;
      transition: border-color 0.2s;
      display: block;
    }
    a:hover { border-color: #00fff5; }
    .app-desc { color: #606080; font-size: 0.8rem; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>HYPERFOCUSED ENGINEER</h1>
    <p class="tagline">Apps & Tools</p>
    <div class="apps">
      <a href="system-design-arcade/">
        System Design Arcade
        <div class="app-desc">Learn system design through arcade-style games</div>
      </a>
      <a href="koo/">
        Koo
        <div class="app-desc">Coming soon</div>
      </a>
    </div>
  </div>
</body>
</html>
